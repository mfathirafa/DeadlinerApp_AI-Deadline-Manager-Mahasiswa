services:
  - type: web
    name: deadliner-app-ai
    runtime: php
    buildCommand: "./render-build.sh"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_NAME
        value: DeadlinerApp_AI
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:hB3TKZtPQcV4bpY57l0SJvItnYJ9OjMXV9xIaKmE4r0=
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: deadliner-app-ai
          property: host
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: deadliner-mysql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: deadliner-mysql
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: deadliner-mysql
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: deadliner-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: deadliner-mysql
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: GROQ_API_KEY
        value: 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
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

databases:
  - name: deadliner-mysql
    databaseName: deadliner_app_ai
    user: deadliner_user
    plan: free